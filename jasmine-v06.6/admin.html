<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Jasmine Admin Dashboard
</title>


<link rel="stylesheet" href="css/style.css">


</head>


<body>


<div class="container">


<header class="header">


<div class="brand">


<img
src="assets/logo.png"
class="logo"
alt="Logo"
>


<div>

<h1>
Personal Assistant
</h1>


<p>
Jasmine Admin Dashboard
</p>


</div>


</div>


</header>





<div class="dashboard-card admin-card">


<h2>
Existing Executives
</h2>


<div id="executive-list">


<p>
Loading executives...
</p>


</div>


</div>








<div class="dashboard-card admin-card">


<h2>
Add Executive
</h2>



<label>
Executive ID
</label>


<input 
type="text"
id="executive-id"
placeholder="e.g. wasantha"
>




<label>
Full Name
</label>


<input 
type="text"
id="executive-name"
placeholder="e.g. Wasantha Ranasinghe"
>




<label>
Job Title
</label>


<input 
type="text"
id="executive-title"
placeholder="e.g. Director - East Africa"
>




<label>
Company
</label>


<input 
type="text"
id="executive-company"
placeholder="e.g. EFL Global"
>




<button id="generate-executive">

Generate Executive JSON

</button>



</div>








<div class="dashboard-card admin-card">


<h2>
Trip Management
</h2>


<p>
Coming next:
Create travel itineraries.
</p>


</div>







<div class="dashboard-card admin-card">


<h2>
Documents
</h2>


<p>
Coming next:
Add document links.
</p>


</div>







<div class="dashboard-card admin-card">


<h2>
Export

</h2>


<p>
Generate files for GitHub upload.
</p>


</div>






</div>






<script src="js/admin.js"></script>


</body>

</html>
