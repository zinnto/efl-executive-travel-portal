<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Jasmine Admin Dashboard
</title>


<link rel="stylesheet" href="css/style.css">


</head>


<body>


<div class="container">



<header class="header">


<div class="brand">


<img
src="assets/logo.png"
class="logo"
alt="Logo"
>


<div>

<h1>
Personal Assistant
</h1>


<p>
Jasmine Admin Dashboard
</p>


</div>


</div>


</header>







<div class="dashboard-card admin-card">


<h2>
Existing Executives
</h2>


<div id="executive-list">

<p>
Loading executives...
</p>

</div>


</div>








<div class="dashboard-card admin-card">


<h2>
Add Executive
</h2>


<label>
Executive ID
</label>

<input 
type="text"
id="executive-id"
>



<label>
Full Name
</label>

<input 
type="text"
id="executive-name"
>



<label>
Job Title
</label>

<input 
type="text"
id="executive-title"
>



<label>
Company
</label>

<input 
type="text"
id="executive-company"
>



<button id="generate-executive">

Generate Executive JSON

</button>


</div>









<div 
class="dashboard-card admin-card"
id="edit-section"
style="display:none;"
>


<h2>
Edit Executive
</h2>


<input 
type="hidden"
id="edit-id"
>


<label>
Full Name
</label>

<input 
type="text"
id="edit-name"
>



<label>
Job Title
</label>

<input 
type="text"
id="edit-title"
>



<label>
Company
</label>

<input 
type="text"
id="edit-company"
>



<button id="update-executive">

Generate Updated JSON

</button>


</div>









<div class="dashboard-card admin-card">


<h2>
Create New Trip
</h2>


<label>
Trip ID
</label>

<input
type="text"
id="trip-id"
>



<label>
Executive ID
</label>

<input
type="text"
id="trip-executive"
>



<label>
Trip Name
</label>

<input
type="text"
id="trip-name"
>



<label>
Destination
</label>

<input
type="text"
id="trip-destination"
>



<label>
Dates
</label>

<input
type="text"
id="trip-dates"
>



<label>
Status
</label>

<input
type="text"
id="trip-status"
>






<h3>
Flight Details
</h3>


<label>
Airline
</label>

<input
type="text"
id="flight-airline"
>


<label>
Flight Number
</label>

<input
type="text"
id="flight-number"
>


<label>
Route
</label>

<input
type="text"
id="flight-route"
>


<label>
Departure
</label>

<input
type="text"
id="flight-departure"
>






<h3>
Hotel Details
</h3>


<label>
Hotel Name
</label>

<input
type="text"
id="hotel-name"
>


<label>
Check In
</label>

<input
type="text"
id="hotel-checkin"
>


<label>
Check Out
</label>

<input
type="text"
id="hotel-checkout"
>





<h3>
Schedule Builder
</h3>


<label>
Date
</label>

<input
type="text"
id="schedule-date"
placeholder="21 July 2026"
>



<label>
Time
</label>

<input
type="text"
id="schedule-time"
placeholder="09:00"
>



<label>
Event
</label>

<input
type="text"
id="schedule-event"
placeholder="Business Meeting"
>



<label>
Location
</label>

<input
type="text"
id="schedule-location"
placeholder="Kampala"
>




<button id="add-schedule">

Add Schedule Item

</button>



<div id="schedule-preview">

<p>
No schedule items added.
</p>

</div>







<button id="generate-trip">

Generate Trip JSON

</button>


</div>









<div class="dashboard-card admin-card">


<h2>
Documents
</h2>


<p>
Coming next:
Document links.
</p>


</div>







<div class="dashboard-card admin-card">


<h2>
Export
</h2>


<p>
Generate files for GitHub upload.
</p>


</div>






</div>






<script src="js/admin.js"></script>


</body>

</html>
