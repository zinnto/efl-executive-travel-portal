<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Jasmine v1.0 Admin
</title>


<link rel="stylesheet" href="css/style.css">


</head>


<body>


<div class="app-layout">



<aside class="sidebar">


<div class="brand">


<img
src="assets/logo.png"
class="logo"
alt="Jasmine Logo"
>


<h2>
Jasmine
</h2>


<p>
Executive Assistant OS
</p>


</div>





<nav>


<button class="nav-button active"
data-page="dashboard">

Dashboard

</button>



<button class="nav-button"
data-page="executives">

Executives

</button>



<button class="nav-button"
data-page="trips">

Trips

</button>



<button class="nav-button"
data-page="settings">

Settings

</button>



</nav>



</aside>









<main class="main-content">





<header class="page-header">


<h1>
Executive Travel Management
</h1>


<p>
Jasmine v1.0
</p>


</header>









<section id="dashboard"
class="page-section">


<div class="card">


<h2>
Welcome back
</h2>


<p>
Your executive travel command centre.
</p>


</div>





<div class="stats-grid">


<div class="card">

<h3>
Executives
</h3>

<p id="executive-count">
0
</p>

</div>


<div class="card">

<h3>
Active Trips
</h3>

<p>
0
</p>

</div>



<div class="card">

<h3>
Pending Items
</h3>

<p>
0
</p>

</div>



</div>



</section>









<section id="executives"
class="page-section hidden">


<div class="card">


<div class="section-header">


<h2>
Executives
</h2>


<button id="new-executive">

+ Add Executive

</button>


</div>





<div id="executive-list">

Loading...

</div>



</div>







<div id="executive-form"
class="card hidden">



<h2>
New Executive
</h2>





<label>
Full Name
</label>


<input id="executive-name"
placeholder="Name">






<label>
Position
</label>


<input id="executive-title"
placeholder="Job Title">






<label>
Company
</label>


<input id="executive-company"
placeholder="Company">






<label>
Email
</label>


<input id="executive-email"
placeholder="Email">






<label>
Phone
</label>


<input id="executive-phone"
placeholder="Phone">






<button id="save-executive">

Save Executive

</button>



</div>



</section>









<section id="trips"
class="page-section hidden">


<div class="card">


<h2>
Trips
</h2>


<p>
Trip Manager will be added here.
</p>



<button>
+ New Trip
</button>



</div>



</section>









<section id="settings"
class="page-section hidden">


<div class="card">


<h2>
Settings
</h2>


<p>
Jasmine configuration.
</p>



</div>


</section>









</main>


</div>








<script src="js/app.js"></script>

<script src="js/admin.js"></script>



</body>

</html>
